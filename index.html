<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mayday — Pipeline Review</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.x/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f8f8f7;--bg3:#f1f0ed;
  --text:#1a1a18;--text2:#6b6b67;--text3:#9b9b96;
  --border:#e5e4e0;--border2:#d0cfc9;
  --blue:#1a6fba;--blue-bg:#eaf2fb;
  --green:#2d7d46;--green-bg:#eaf5ee;
  --amber:#a05c00;--amber-bg:#fef3e2;
  --red:#c0392b;--red-bg:#fdecea;
  --r:8px;--rl:12px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;color:var(--text);background:var(--bg3);min-height:100vh}

/* Auth */
.auth{position:fixed;inset:0;background:var(--bg3);display:flex;align-items:center;justify-content:center;z-index:200}
.auth-box{background:var(--bg);border:1px solid var(--border);border-radius:var(--rl);padding:32px;width:340px;text-align:center}
.auth-logo{font-size:18px;font-weight:700;margin-bottom:6px;display:flex;align-items:center;justify-content:center;gap:8px}
.auth-logo i{color:var(--blue)}
.auth-sub{font-size:13px;color:var(--text2);margin-bottom:24px}
.auth-input{width:100%;border:1px solid var(--border2);border-radius:var(--r);padding:10px 12px;font-size:14px;font-family:inherit;margin-bottom:12px;text-align:center;letter-spacing:2px}
.auth-input:focus{outline:none;border-color:var(--blue)}
.auth-btn{width:100%;background:var(--text);color:var(--bg);border:none;border-radius:var(--r);padding:10px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit}
.auth-btn:hover{opacity:.85}
.auth-error{color:var(--red);font-size:12px;margin-top:8px;display:none}

/* Topbar */
.topbar{background:var(--bg);border-bottom:1px solid var(--border);height:52px;padding:0 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.brand{font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px}
.brand i{color:var(--blue)}
.brand-sub{font-size:12px;color:var(--text2);font-weight:400}
.topbar-right{font-size:12px;color:var(--text2);display:flex;align-items:center;gap:12px}
.last-update{font-size:11px;color:var(--text3)}

/* Main */
.main{max-width:1100px;margin:0 auto;padding:24px}
.page-header{margin-bottom:24px}
.page-title{font-size:20px;font-weight:600;margin-bottom:4px}
.page-sub{font-size:13px;color:var(--text2)}

/* KPIs */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.kpi{background:var(--bg);border:1px solid var(--border);border-radius:var(--rl);padding:16px 20px}
.kpi-value{font-size:24px;font-weight:700;margin-bottom:2px}
.kpi-label{font-size:12px;color:var(--text2)}

/* Deal cards */
.deal-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--rl);margin-bottom:12px;overflow:hidden}
.deal-header{padding:16px 20px;display:flex;align-items:center;gap:16px;cursor:pointer;transition:background .15s}
.deal-header:hover{background:var(--bg2)}
.deal-company{font-size:16px;font-weight:600;margin-bottom:4px}
.deal-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.deal-meta-item{font-size:12px;color:var(--text2);display:flex;align-items:center;gap:3px}
.deal-amount{font-size:20px;font-weight:700;text-align:right;white-space:nowrap}
.deal-amount-label{font-size:11px;color:var(--text3)}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
.badge-blue{background:var(--blue-bg);color:var(--blue)}
.badge-green{background:var(--green-bg);color:var(--green)}
.badge-amber{background:var(--amber-bg);color:var(--amber)}
.badge-red{background:var(--red-bg);color:var(--red)}
.badge-gray{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}

/* Score bar */
.score-bar{height:4px;background:var(--bg3);border-radius:2px;width:140px;overflow:hidden;margin-top:6px}
.score-fill{height:100%;background:var(--text);border-radius:2px}
.score-label{font-size:11px;color:var(--text3);margin-bottom:2px}

/* Deal body */
.deal-body{border-top:1px solid var(--border);display:none}
.deal-body.open{display:block}
.deal-tabs{display:flex;border-bottom:1px solid var(--border);padding:0 20px}
.deal-tab{padding:9px 16px;font-size:13px;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-1px}
.deal-tab.active{color:var(--text);border-bottom-color:var(--text);font-weight:500}
.deal-panel{padding:20px;display:none}
.deal-panel.active{display:block}

/* Sections */
.sec{background:var(--bg);border:1px solid var(--border);border-radius:var(--rl);margin-bottom:12px;overflow:hidden}
.sec-head{padding:11px 16px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.sec-head:hover{background:var(--bg3)}
.sec-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text2)}
.sec-body{padding:16px}

/* Snap grid */
.snap-row{display:grid;grid-template-columns:160px 1fr;gap:10px;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px}
.snap-row:last-child{border-bottom:none}
.snap-key{color:var(--text2);font-size:12px;padding-top:2px}

/* MEDDPICC */
.medc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.medc-item{border:1px solid var(--border);border-radius:var(--r);padding:10px}
.medc-top{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.medc-status{font-size:16px}
.medc-name{font-size:12px;font-weight:600}
.medc-sub{font-size:11px;color:var(--text2)}
.medc-detail{font-size:12px;color:var(--text2);line-height:1.5}

/* Stakeholders */
.stk-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.stk-card{border:1px solid var(--border);border-radius:var(--r);padding:12px}
.stk-name{font-size:13px;font-weight:600;margin-bottom:2px}
.stk-role{font-size:11px;color:var(--text2);margin-bottom:8px}
.stk-badges{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px}
.stk-reason{font-size:11px;color:var(--text2);margin-top:4px;line-height:1.5}

/* Coaching */
.coach-block{border:1px solid var(--border);border-radius:var(--rl);padding:14px;margin-bottom:10px;border-left:3px solid var(--border2)}
.coach-block.success{border-left-color:var(--green)}
.coach-block.warning{border-left-color:var(--amber)}
.coach-block.info{border-left-color:var(--blue)}
.coach-block.danger{border-left-color:var(--red)}
.coach-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.coach-block.success .coach-title{color:var(--green)}
.coach-block.warning .coach-title{color:var(--amber)}
.coach-block.info .coach-title{color:var(--blue)}
.coach-block.danger .coach-title{color:var(--red)}
.coach-item{font-size:13px;padding:5px 0;border-bottom:1px solid var(--border);display:flex;gap:8px;line-height:1.5}
.coach-item:last-child{border-bottom:none}
.coach-dot{flex-shrink:0;width:6px;height:6px;border-radius:50%;background:currentColor;margin-top:6px}

/* Next steps */
.ns-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;padding:3px 8px;border-radius:var(--r);display:inline-block;margin-bottom:6px}
.ns-label.imm{background:var(--red-bg);color:var(--red)}
.ns-label.ct{background:var(--amber-bg);color:var(--amber)}
.ns-label.mt{background:var(--bg3);color:var(--text2)}
.ns-item{font-size:13px;padding:5px 0;border-bottom:1px solid var(--border);display:flex;gap:8px}
.ns-item:last-child{border-bottom:none}
.ns-group{margin-bottom:14px}

/* Meeting */
.meet-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.meet-item{background:var(--bg2);border-radius:var(--r);padding:10px 12px}
.meet-label{font-size:11px;color:var(--text2);margin-bottom:3px}
.meet-val{font-size:13px}

/* Readonly badge */
.readonly-badge{background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:3px 10px;font-size:11px;color:var(--text2)}

@media(max-width:600px){
  .kpis{grid-template-columns:1fr 1fr}
  .medc-grid{grid-template-columns:1fr 1fr}
  .meet-grid{grid-template-columns:1fr}
}
</style>
</head>

function checkAuth() {
  const val = document.getElementById('auth-input').value;
  if (val === PASSWORD) {
    document.getElementById('auth').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    init();
  } else {
    document.getElementById('auth-error').style.display = 'block';
    document.getElementById('auth-input').value = '';
    document.getElementById('auth-input').focus();
  }
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtDate(iso) {
  if (!iso) return 'N/A';
  try { return new Date(iso).toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'}); }
  catch(e) { return iso; }
}
function fmtAmt(n) {
  if (!n) return '—';
  return Number(n).toLocaleString('fr-FR')+'€';
}
function stageColor(s) {
  const v = (s||'').toLowerCase();
  if (v.includes('gagn') || v.includes('clos')) return 'badge-green';
  if (v.includes('perdu')) return 'badge-red';
  if (v.includes('propos') || v.includes('negoc')) return 'badge-amber';
  return 'badge-blue';
}
function meddScore(deal) {
  const m = deal.generated?.meddpicc||{};
  let s = 0;
  Object.values(m).forEach(v => {
    if (v.status==='✅') s++;
    else if (v.status==='🟡') s+=.5;
  });
  return Math.round(s*10)/10;
}

function init() {
  // Last update
  const dates = DEALS.map(d => d.updated_at).filter(Boolean).sort().reverse();
  if (dates[0]) document.getElementById('last-update').textContent = 'MàJ ' + fmtDate(dates[0]);

  // Pipeline sub
  const total = DEALS.reduce((a,d) => a + (d.amount||0), 0);
  document.getElementById('pipeline-sub').textContent = `${DEALS.length} deals actifs — Pipeline total : ${fmtAmt(total)}`;

  // KPIs
  const totalPipe = DEALS.reduce((a,d) => a + (d.amount||0), 0);
  const avgMedd = DEALS.reduce((a,d) => a + meddScore(d), 0) / DEALS.length;
  const byStage = {};
  DEALS.forEach(d => { byStage[d.stage] = (byStage[d.stage]||0) + 1; });
  const topStage = Object.entries(byStage).sort((a,b) => b[1]-a[1])[0]?.[0] || '—';

  document.getElementById('kpis').innerHTML = `
    <div class="kpi"><div class="kpi-value">${fmtAmt(totalPipe)}</div><div class="kpi-label">Pipeline total ARR</div></div>
    <div class="kpi"><div class="kpi-value">${DEALS.length}</div><div class="kpi-label">Deals actifs</div></div>
    <div class="kpi"><div class="kpi-value">${avgMedd.toFixed(1)}/8</div><div class="kpi-label">Score MEDDPICC moyen</div></div>
    <div class="kpi"><div class="kpi-value">${fmtAmt(Math.round(totalPipe/DEALS.length))}</div><div class="kpi-label">Deal size moyen</div></div>
  `;

  // Deals
  document.getElementById('deals-list').innerHTML = DEALS.map((d,i) => buildDealCard(d,i)).join('');
}

function toggleDeal(i) {
  const body = document.getElementById('deal-body-'+i);
  const icon = document.getElementById('deal-icon-'+i);
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open');
  icon.style.transform = isOpen ? '' : 'rotate(180deg)';
  if (!isOpen) showTab(i, 'overview');
}

function showTab(dealIdx, tab) {
  ['overview','coaching','stakeholders','nextsteps'].forEach(t => {
    const panel = document.getElementById(`panel-${dealIdx}-${t}`);
    const tabEl = document.getElementById(`tab-${dealIdx}-${t}`);
    if (panel) panel.classList.toggle('active', t===tab);
    if (tabEl) tabEl.classList.toggle('active', t===tab);
  });
}

function toggleSec(el) {
  const body = el.nextElementSibling;
  const icon = el.querySelector('.ti-chevron-down');
  if (!body) return;
  const hidden = body.style.display === 'none';
  body.style.display = hidden ? '' : 'none';
  if (icon) icon.style.transform = hidden ? '' : 'rotate(-90deg)';
}

function buildDealCard(d, i) {
  const score = meddScore(d);
  const pct = Math.round((score/8)*100);
  const g = d.generated || {};
  const snap = g.snapshot || {};
  const meet = g.prochain_meeting || {};
  const medc = g.meddpicc || {};
  const stk = g.stakeholders || [];
  const ns = g.next_steps || {};
  const coach = g.coaching || {};
  const last = g.dernier_call || {};

  const MKEYS = [
    {k:'M',l:'Metrics'},{k:'E',l:'Economic Buyer'},{k:'D1',l:'Decision Criteria'},
    {k:'D2',l:'Decision Process'},{k:'P',l:'Paper Process'},
    {k:'I',l:'Identify Pain'},{k:'C1',l:'Champion'},{k:'C2',l:'Competition'}
  ];

  function coachBlock(items, cls, icon, title) {
    if (!items?.length) return '';
    return `<div class="coach-block ${cls}">
      <div class="coach-title"><i class="ti ti-${icon}"></i>${title}</div>
      ${items.map(s=>`<div class="coach-item"><span class="coach-dot"></span><span>${esc(s)}</span></div>`).join('')}
    </div>`;
  }

  return `
<div class="deal-card">
  <div class="deal-header" onclick="toggleDeal(${i})">
    <div style="flex:1">
      <div class="deal-company">${esc(d.company)}</div>
      <div class="deal-meta">
        <span class="badge ${stageColor(d.stage)}">${esc(d.stage||'—')}</span>
        <span class="deal-meta-item"><i class="ti ti-calendar" style="font-size:12px"></i>Closing ${fmtDate(d.closing_date)}</span>
        ${d.hubspot_url?`<a href="${esc(d.hubspot_url)}" onclick="event.stopPropagation()" target="_blank" style="font-size:12px;color:var(--blue);display:flex;align-items:center;gap:3px"><i class="ti ti-external-link" style="font-size:12px"></i>HubSpot</a>`:''}
      </div>
      <div style="margin-top:8px;max-width:180px">
        <div class="score-label">MEDDPICC ${score}/8</div>
        <div class="score-bar"><div class="score-fill" style="width:${pct}%"></div></div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:16px">
      <div style="text-align:right">
        <div class="deal-amount">${fmtAmt(d.amount)}</div>
        <div class="deal-amount-label">ARR/an</div>
      </div>
      <i class="ti ti-chevron-down" id="deal-icon-${i}" style="font-size:18px;color:var(--text2);transition:transform .2s"></i>
    </div>
  </div>
  <div class="deal-body" id="deal-body-${i}">
    <div class="deal-tabs">
      <div class="deal-tab" id="tab-${i}-overview" onclick="showTab(${i},'overview')">Overview</div>
      <div class="deal-tab" id="tab-${i}-coaching" onclick="showTab(${i},'coaching')">Coaching</div>
      <div class="deal-tab" id="tab-${i}-stakeholders" onclick="showTab(${i},'stakeholders')">Stakeholders</div>
      <div class="deal-tab" id="tab-${i}-nextsteps" onclick="showTab(${i},'nextsteps')">Next Steps</div>
    </div>

    <!-- OVERVIEW -->
    <div class="deal-panel" id="panel-${i}-overview">
      <div class="sec">
        <div class="sec-head" onclick="toggleSec(this)"><span class="sec-title">Snapshot</span><i class="ti ti-chevron-down"></i></div>
        <div class="sec-body">
          ${[['Montant','montant'],['Licences','licences'],['Produits','produits'],['Populations','populations'],['Stage','stage'],['Probabilité','probability'],['Timeline','timeline'],['Compelling event','compelling_event'],['Solutions actuelles','solutions_actuelles'],['Compétition','competition']].map(([l,k])=>`
          <div class="snap-row"><div class="snap-key">${l}</div><div>${esc(snap[k]||'—')}</div></div>`).join('')}
        </div>
      </div>
      <div class="sec">
        <div class="sec-head" onclick="toggleSec(this)"><span class="sec-title">MEDDPICC</span><i class="ti ti-chevron-down"></i></div>
        <div class="sec-body">
          <div class="medc-grid">
          ${MKEYS.map(({k,l})=>`
          <div class="medc-item">
            <div class="medc-top"><span class="medc-status">${medc[k]?.status||'❌'}</span><div><div class="medc-name">${k.replace(/[12]/,'')} <span style="font-weight:400;color:var(--text2)">${l}</span></div></div></div>
            <div class="medc-detail">${esc(medc[k]?.detail||'Non renseigné')}</div>
          </div>`).join('')}
          </div>
        </div>
      </div>
      <div class="sec">
        <div class="sec-head" onclick="toggleSec(this)"><span class="sec-title">Prochain meeting</span><i class="ti ti-chevron-down"></i></div>
        <div class="sec-body">
          <div class="meet-grid">
            <div class="meet-item"><div class="meet-label">Date</div><div class="meet-val">${esc(meet.date||'—')}</div></div>
            <div class="meet-item"><div class="meet-label">Participants</div><div class="meet-val">${esc(meet.participants||'—')}</div></div>
            <div class="meet-item"><div class="meet-label">Topic</div><div class="meet-val">${esc(meet.topic||'—')}</div></div>
            <div class="meet-item"><div class="meet-label">Objectif</div><div class="meet-val">${esc(meet.objectif||'—')}</div></div>
          </div>
        </div>
      </div>
      <div class="sec">
        <div class="sec-head" onclick="toggleSec(this)"><span class="sec-title">Dernier call</span><i class="ti ti-chevron-down"></i></div>
        <div class="sec-body">
          <div class="meet-grid" style="margin-bottom:12px">
            <div class="meet-item"><div class="meet-label">Date</div><div class="meet-val">${esc(last.date||'—')}</div></div>
            <div class="meet-item"><div class="meet-label">Durée</div><div class="meet-val">${esc(last.duree||'—')}</div></div>
            <div class="meet-item"><div class="meet-label">Participants</div><div class="meet-val">${esc(last.participants||'—')}</div></div>
            <div class="meet-item"><div class="meet-label">Sujets</div><div class="meet-val">${esc(last.sujets||'—')}</div></div>
          </div>
          <div style="font-size:12px;color:var(--text2);margin-bottom:4px;font-weight:500">Points clés</div>
          <div style="font-size:13px;line-height:1.6">${esc(last.points_cles||'—')}</div>
          <div style="font-size:12px;color:var(--text2);margin:10px 0 4px;font-weight:500">Next steps engagés</div>
          <div style="font-size:13px;line-height:1.6">${esc(last.next_steps||'—')}</div>
        </div>
      </div>
    </div>

    <!-- COACHING -->
    <div class="deal-panel" id="panel-${i}-coaching">
      ${coachBlock(coach.bien_marche,'success','circle-check','Ce qui a bien marché')}
      ${coachBlock(coach.a_ameliorer,'warning','alert-triangle','Ce qui aurait pu être mieux')}
      ${coachBlock(coach.actions_prioritaires,'info','list-check','Actions prioritaires')}
      ${coachBlock(coach.risques,'danger','alert-circle','Risques à adresser')}
      ${coachBlock(coach.questions_prochain_call,'','message-question','Questions à poser au prochain call')}
    </div>

    <!-- STAKEHOLDERS -->
    <div class="deal-panel" id="panel-${i}-stakeholders">
      <div class="stk-grid">
      ${stk.map(s=>{
        const pc = s.position==='Favorable'?'badge-green':s.position==='Défavorable'?'badge-red':'badge-gray';
        const ic = (s.influence==='Décideur'||s.influence==='Champion')?'badge-blue':'badge-gray';
        return `<div class="stk-card">
          <div class="stk-name">${esc(s.nom||'Inconnu')}</div>
          <div class="stk-role">${esc(s.role||'')}</div>
          <div class="stk-badges">
            <span class="badge ${ic}">${esc(s.influence||'?')}</span>
            <span class="badge ${pc}">${esc(s.position||'Inconnu')}</span>
          </div>
          ${s.linkedin?`<a href="${esc(s.linkedin)}" target="_blank" style="font-size:11px;color:var(--blue);display:inline-flex;align-items:center;gap:3px"><i class="ti ti-external-link" style="font-size:11px"></i>LinkedIn</a>`:''}
          <div class="stk-reason">${esc(s.raison||'')}</div>
        </div>`;
      }).join('')}
      ${stk.length===0?'<p style="font-size:13px;color:var(--text2)">Aucun stakeholder identifié.</p>':''}
      </div>
    </div>

    <!-- NEXT STEPS -->
    <div class="deal-panel" id="panel-${i}-nextsteps">
      <div class="ns-group"><span class="ns-label imm">Immédiat</span>
        ${(ns.immediat||[]).map(s=>`<div class="ns-item"><span style="color:var(--red);font-size:16px;margin-top:-1px">•</span>${esc(s)}</div>`).join('')}
      </div>
      <div class="ns-group"><span class="ns-label ct">Court terme</span>
        ${(ns.court_terme||[]).map(s=>`<div class="ns-item"><span style="color:var(--amber);font-size:16px;margin-top:-1px">•</span>${esc(s)}</div>`).join('')}
      </div>
      <div class="ns-group"><span class="ns-label mt">Moyen terme</span>
        ${(ns.moyen_terme||[]).map(s=>`<div class="ns-item"><span style="color:var(--text2);font-size:16px;margin-top:-1px">•</span>${esc(s)}</div>`).join('')}
      </div>
    </div>
  </div>
</div>`;
}
</script>
